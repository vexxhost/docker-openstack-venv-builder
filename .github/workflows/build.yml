name: build

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main
      - stable/**

permissions:
  contents: read

jobs:
  image:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu
            image-name: openstack-venv-builder-ubuntu
            from: ghcr.io/vexxhost/python-base-ubuntu:2026.1@sha256:89f2f4b2e21c571c422331d81bbacf24d6e94a3ee9a7f54750f8b68d0f923e1f
          - name: ubuntu-cloud-archive
            image-name: openstack-venv-builder-ubuntu-cloud-archive
            from: ghcr.io/vexxhost/python-base-ubuntu-cloud-archive:2026.1@sha256:6357428f330c9fd4f6caa4930daac095a09f20fc01ec76a64f12ae6ecb8018a9
          - name: ubuntu-cloud-archive-legacy
            image-name: openstack-venv-builder
            from: ghcr.io/vexxhost/python-base:2026.1@sha256:eb791072269c87d5a01f75e9262e44da7779467679a7e508737bfeac4321813b
          - name: debian
            image-name: openstack-venv-builder-debian
            from: ghcr.io/vexxhost/python-base-debian:2026.1@sha256:ffa00df5ecf7ebac7f40cba735aa6a0cd2e4dd61cedb31863ac331e7ab650e33
          - name: rockylinux
            image-name: openstack-venv-builder-rockylinux
            from: ghcr.io/vexxhost/python-base-rockylinux:2026.1@sha256:4bbf3a9fa47ae40baf2188708b7619b18684aac53b45cbdf22fdb29c192a6b72
          - name: almalinux
            image-name: openstack-venv-builder-almalinux
            from: ghcr.io/vexxhost/python-base-almalinux:2026.1@sha256:b999fc60c429e9a793bbef1504e567481fee07cd2ff2b01cbae29162ae4fd78c
    permissions:
      contents: read
      id-token: write
      packages: write
      pull-requests: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: vexxhost/docker-atmosphere/.github/actions/checkout@e012e9b7df8e22166070c4389caf52285807598a # main
        with:
          repository: openstack/requirements
          ref: c4c55d5279d824dc261a43ac51b56146ccc4dd4f # stable/2026.1

      - uses: vexxhost/docker-atmosphere/.github/actions/build-image@e012e9b7df8e22166070c4389caf52285807598a # main
        with:
          image-name: ${{ matrix.image-name }}
          build-contexts: requirements=openstack/requirements
          build-args: FROM=${{ matrix.from }}
          push: ${{ github.event_name != 'pull_request' }}
