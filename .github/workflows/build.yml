name: build

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main
      - stable/**

permissions:
  contents: read

jobs:
  image:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu
            image-name: openstack-venv-builder-ubuntu
            from: ghcr.io/vexxhost/python-base-ubuntu:2026.1@sha256:f1e2085167eae801ce4899b0d71b8ca647200227b1b16b0687cb565b447f6286
          - name: ubuntu-cloud-archive
            image-name: openstack-venv-builder-ubuntu-cloud-archive
            from: ghcr.io/vexxhost/python-base-ubuntu-cloud-archive:2026.1@sha256:951b186aa89331a6a1fb4696abaf1f7bee8162717a7d2e0d4fbc35fc6d7d5525
          - name: ubuntu-cloud-archive-legacy
            image-name: openstack-venv-builder
            from: ghcr.io/vexxhost/python-base:2026.1@sha256:81b87837a0344a484be4dc3c235ceb9ef1052c8118073f6bea7f8b450ee009ce
          - name: debian
            image-name: openstack-venv-builder-debian
            from: ghcr.io/vexxhost/python-base-debian:2026.1@sha256:2e3dd8f502bb52238da2a51036af896116ae4cfcb43fafdbe273b7d353eeef18
          - name: rockylinux
            image-name: openstack-venv-builder-rockylinux
            from: ghcr.io/vexxhost/python-base-rockylinux:2026.1@sha256:a609e7b96680c1563778557426e23069b6bee0a270d3d52d8cb31442b7bc9e6b
          - name: almalinux
            image-name: openstack-venv-builder-almalinux
            from: ghcr.io/vexxhost/python-base-almalinux:2026.1@sha256:cbd450180618fda559e7c3c3dfd83e5c17df6733240ba029347b1e06b8240072
    permissions:
      contents: read
      id-token: write
      packages: write
      pull-requests: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: vexxhost/docker-atmosphere/.github/actions/checkout@2b0040e59869e408a94f1e92e67fa47035c50336 # main
        with:
          repository: openstack/requirements
          ref: 06cd4e8523cbade25fb93efc4f8ea77d6d97064f # stable/2026.1

      - uses: vexxhost/docker-atmosphere/.github/actions/build-image@2b0040e59869e408a94f1e92e67fa47035c50336 # main
        with:
          image-name: ${{ matrix.image-name }}
          build-contexts: requirements=openstack/requirements
          build-args: FROM=${{ matrix.from }}
          push: ${{ github.event_name != 'pull_request' }}
